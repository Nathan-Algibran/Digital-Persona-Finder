<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Persona Finder</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-blur b1"></div>
  <div class="bg-blur b2"></div>

  <main class="container">

    <section class="card">
      <h1>Digital Persona Finder</h1>
      <p class="sub">Discover your digital identity</p>

      <input id="name" type="text" placeholder="Name">
      <select id="hobbySelect" class="custom-select" onchange="toggleCustomHobby()">
      <option value="" disabled selected hidden>Select Hobby</option>
      <option value="coding">Coding</option>
      <option value="design">Design</option>
      <option value="music">Music</option>
      <option value="gaming">Gaming</option>
      <option value="reading">Reading</option>
      <option value="studying">Studying</option>
      <option value="drawing">Drawing</option>
      <option value="other">Other</option>
    </select>

    <input 
      type="text" 
      id="customHobby" 
      class="custom-select" 
      placeholder="Type your hobby"
      style="display:none;"
    >
      <input id="number" type="number" min="1" max="10" placeholder="Lucky number (1-10)">

      <button onclick="findPersona(event)">Generate Persona</button>

      <button class="secondary" onclick="exportPDF()">Export Result PDF</button>

      <div id="result" class="result">Hasil akan muncul di sini...</div>
    </section>

    <section class="card profile">
      <img src="Nathan.png" alt="profile">
      <h2>Muhammad Nathan Algibran</h2>
      <p>Undergraduate Informatics Student at Bengkulu University || Faculty Of Engineering</p>

      <a href="https://github.com/Nathan-Algibran" class="link-btn">
        <img src="icons/github.png" alt="GitHub">
        <span>GitHub</span>
      </a>
      <a href="https://nalgibran-portfolio-nine.vercel.app/" class="link-btn">
        <img src="icons/portfolio.png" alt="portfolio">
        <span>Portfolio</span>
      </a>
      <a href="https://www.linkedin.com/in/muhammad-nathan-algibran-6b1430322/" class="link-btn">
        <img src="icons/linkedin.png" alt="linkedin">
        <span>LinkedIn</span>
      </a>
      <a href="https://wa.me/6289" class="link-btn">
        <img src="icons/whatsapp.png" alt="Contact">
        <span>Contact</span>
      </a>
    </section>

  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
